<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drive2PDF</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="mark" aria-hidden="true">D2P</div>
        <div>
          <h1>Drive2PDF</h1>
          <p id="subtitle">Rendered pages to PDF</p>
        </div>
      </header>

      <section class="actions" aria-label="Extraction controls">
        <button id="startButton" class="primary" type="button">Start Extraction</button>
        <button id="cancelButton" class="secondary" type="button" disabled>Cancel</button>
      </section>

      <section class="progress-card" aria-label="Progress">
        <div class="progress-meta">
          <span id="statusText">Idle</span>
          <span id="pageCounter">0 pages</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progressFill"></div>
        </div>
      </section>

      <button id="settingsToggle" class="settings-toggle" type="button" aria-expanded="false">
        Settings
        <span aria-hidden="true">v</span>
      </button>

      <section id="settingsPanel" class="settings-panel" hidden>
        <label>
          <span>Scroll speed</span>
          <input id="scrollSpeed" type="range" min="150" max="2500" step="50">
          <output id="scrollSpeedValue"></output>
        </label>

        <label>
          <span>Render wait</span>
          <input id="renderWaitMs" type="number" min="150" max="5000" step="50">
        </label>

        <label>
          <span>Image quality</span>
          <input id="imageQuality" type="range" min="0.5" max="1" step="0.01">
          <output id="imageQualityValue"></output>
        </label>

        <label>
          <span>Output filename</span>
          <input id="outputFilename" type="text" autocomplete="off" spellcheck="false">
        </label>

        <label>
          <span>PDF page size</span>
          <select id="pageSize">
            <option value="auto">Auto per page</option>
            <option value="a4">A4 fit</option>
            <option value="letter">Letter fit</option>
          </select>
        </label>

        <label>
          <span>Max pages</span>
          <input id="maxPages" type="number" min="1" max="1000" step="1">
        </label>

        <label class="check-row">
          <input id="autoDownload" type="checkbox">
          <span>Download automatically</span>
        </label>

        <label class="check-row">
          <input id="includeScreenshotFallback" type="checkbox">
          <span>Use screenshot fallback</span>
        </label>
      </section>

      <section class="log-wrap" aria-label="Status log">
        <div id="statusLog" class="status-log"></div>
      </section>
    </main>

    <script src="../shared/constants.js"></script>
    <script src="../shared/logger.js"></script>
    <script src="../shared/settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
